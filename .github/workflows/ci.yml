name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      # —— 协作 OS 层检查（与本地 .githooks 同源 scripts/checks/*）——
      - name: 状态新鲜度（.cloud.md）
        run: bash scripts/checks/check-state-fresh.sh --all

      - name: 文件行数（全仓）
        run: STRICT=1 bash scripts/checks/check-file-size.sh --all

      - name: 关键文件头说明
        run: STRICT=1 bash scripts/checks/check-key-file-header.sh --all

      - name: 依赖边界
        run: STRICT=1 bash scripts/checks/check-import-boundaries.sh --all

      - name: 密钥扫描（全仓 tracked）
        run: bash scripts/checks/check-secrets.sh --all

      # —— 应用架构层检查 ——
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: 应用层 lint / typecheck / test
        run: |
          if [ -f package.json ]; then
            echo "检测到 package.json，运行应用层检查"
            npm ci
            npm run validate
            npm run validate:news --if-present
            npm run lint --if-present
            npm run typecheck --if-present
            npm test --if-present
            npm run build --if-present
          else
            echo "无 package.json，跳过应用层检查（kit 为技术栈中立）"
          fi
