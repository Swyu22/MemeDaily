name: daily-catchup

# Resilience against GitHub dropping scheduled events (as happened 2026-06-22, when the
# primary publish + fallback + monitor were ALL dropped, so no content shipped that day).
#
# Runs several times through the day at off-peak minutes. If today's Asia/Shanghai envelope
# is still MISSING (i.e. the scheduled publish never ran) and no daily-publish run is
# currently active, it dispatches daily-publish to catch up. workflow_dispatch is processed
# reliably (unlike the schedule event), so once any one of these checks fires, the catch-up
# publish will actually run. Multiple spread-out times mean it survives GitHub dropping some.
#
# Cheap when there is nothing to do (just a file existence check). Quality is unchanged: the
# triggered publish applies the exact same gates and may legitimately produce partial/skipped.

on:
  schedule:
    # Every hour on the hour 00:00–05:00 UTC = 08:00–13:00 Asia/Shanghai. If today isn't
    # published by 08:00 (cron-job.org @ 07:00 failed), retry hourly until it lands.
    - cron: "0 0,1,2,3,4,5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write # to dispatch daily-publish

concurrency:
  group: daily-catchup
  cancel-in-progress: false

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Dispatch a catch-up publish if today is missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(TZ=Asia/Shanghai date +%F)"
          FILE="data/daily/${DATE}.json"

          if [ -f "$FILE" ]; then
            echo "Today (${DATE}) already has an envelope; nothing to catch up."
            exit 0
          fi

          # Don't stack a second publish if one is already running or queued.
          # Transient GitHub API failures (e.g. a 503) must not burn this hour's catch-up slot
          # (2026-07-20 the news catchup died on a single 503). Retry with backoff; if the
          # run-list check still fails after retries, PROCEED to dispatch — daily-publish has its
          # own concurrency group and already-published dedup guard, so a duplicate queues/no-ops.
          ACTIVE=""
          for attempt in 1 2 3; do
            if ACTIVE="$(gh run list --workflow=daily-publish.yml --json status \
              --jq '[.[] | select(.status == "in_progress" or .status == "queued")] | length')"; then
              break
            fi
            ACTIVE=""
            echo "run-list attempt ${attempt}/3 failed (transient API error?)."
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 15)); fi
          done
          if [ "${ACTIVE:-0}" -gt 0 ]; then
            echo "daily-publish already in progress/queued; letting it finish."
            exit 0
          fi

          echo "Today (${DATE}) not published; dispatching catch-up daily-publish."
          for attempt in 1 2 3; do
            if gh workflow run daily-publish.yml --ref main; then
              echo "Dispatched (attempt ${attempt})."
              exit 0
            fi
            echo "dispatch attempt ${attempt}/3 failed (transient API error?)."
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 20)); fi
          done
          echo "::error::Failed to dispatch daily-publish after 3 attempts."
          exit 1
