name: daily-monitor

# Server-free alerting: if today's Asia/Shanghai envelope is not published/partial
# (Mac asleep, cloud run failed, or only a skipped fallback exists), open/update a
# GitHub Issue so a stalled pipeline is noticed instead of silently showing stale content.

on:
  schedule:
    - cron: "30 6 * * *" # 14:30 Asia/Shanghai, after the 07:00 publish + hourly catch-up window (08:00–13:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Check today's publish and alert if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(TZ=Asia/Shanghai date +%F)"

          # Cost-runaway guard: many daily-publish runs in 18h = repeated re-triggers/failures
          # burning Claude budget (~$4/run). Alert even if today eventually published fine.
          SINCE="$(date -u -d '18 hours ago' +%Y-%m-%dT%H:%M:%SZ)"
          RUNS="$(gh run list --workflow=daily-publish.yml --limit 40 --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo 0)"
          if [ "${RUNS:-0}" -gt 4 ]; then
            RTITLE="MemeDaily 成本异常: ${DATE} (18h 内 daily-publish 运行 ${RUNS} 次)"
            RBODY="自动监控：过去 18 小时 daily-publish 运行了 ${RUNS} 次（每次约 \$4）。可能是反复重试/失败在烧预算，请检查近期运行。"
            REX="$(gh issue list --state open --json number,title --jq "[.[] | select(.title | contains(\"成本异常: ${DATE}\"))][0].number // empty")"
            if [ -n "$REX" ]; then gh issue comment "$REX" --body "$RBODY"; else gh issue create --title "$RTITLE" --body "$RBODY"; fi
          fi

          FILE="data/daily/${DATE}.json"

          if [ -f "$FILE" ]; then
            # Tolerant read: malformed JSON or missing status -> "invalid" (which alerts),
            # never aborts the step under set -e. Path passed via argv, not interpolated.
            STATUS="$(node -e "try{process.stdout.write(String(JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).status||'invalid'))}catch(e){process.stdout.write('invalid')}" "$FILE" 2>/dev/null || echo invalid)"
          else
            STATUS="missing"
          fi
          echo "date=${DATE} status=${STATUS}"

          if [ "$STATUS" = "published" ] || [ "$STATUS" = "partial" ]; then
            echo "OK: today is published/partial."
            exit 0
          fi

          TITLE="MemeDaily 未发布告警: ${DATE} (${STATUS})"
          BODY="自动监控：\`data/daily/${DATE}.json\`（Asia/Shanghai）状态为 \`${STATUS}\`，未成功发布。请检查每日自动化（本地 Codex 或云端 routine）是否运行成功。"
          EXISTING="$(gh issue list --state open --json number,title --jq "[.[]|select(.title|contains(\"${DATE}\"))][0].number // empty")"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
