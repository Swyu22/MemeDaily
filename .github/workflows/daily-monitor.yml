name: daily-monitor

# Server-free alerting: if today's Asia/Shanghai envelope is not published/partial
# (Mac asleep, cloud run failed, or only a skipped fallback exists), open/update a
# GitHub Issue so a stalled pipeline is noticed instead of silently showing stale content.

on:
  schedule:
    - cron: "0 2 * * *" # 10:00 Asia/Shanghai, after the 07:40 publish + 00:40 UTC fallback
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check today's publish and alert if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(TZ=Asia/Shanghai date +%F)"
          FILE="data/daily/${DATE}.json"

          if [ -f "$FILE" ]; then
            # Tolerant read: malformed JSON or missing status -> "invalid" (which alerts),
            # never aborts the step under set -e. Path passed via argv, not interpolated.
            STATUS="$(node -e "try{process.stdout.write(String(JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).status||'invalid'))}catch(e){process.stdout.write('invalid')}" "$FILE" 2>/dev/null || echo invalid)"
          else
            STATUS="missing"
          fi
          echo "date=${DATE} status=${STATUS}"

          if [ "$STATUS" = "published" ] || [ "$STATUS" = "partial" ]; then
            echo "OK: today is published/partial."
            exit 0
          fi

          TITLE="MemeDaily 未发布告警: ${DATE} (${STATUS})"
          BODY="自动监控：\`data/daily/${DATE}.json\`（Asia/Shanghai）状态为 \`${STATUS}\`，未成功发布。请检查每日自动化（本地 Codex 或云端 routine）是否运行成功。"
          EXISTING="$(gh issue list --state open --json number,title --jq "[.[]|select(.title|contains(\"${DATE}\"))][0].number // empty")"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
