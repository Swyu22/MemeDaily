name: cloud-fetch-check

# Feasibility probe for cloud publishing: a GitHub runner is a non-CN datacenter IP,
# a reasonable proxy for the IP a cloud routine would use. This checks whether the public
# CN aggregator/platform pages are readable WITHOUT cookies or anti-bot bypass from such
# an IP. This is a diagnostic for the active cloud pipeline, not a migration prerequisite.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe public sources from a cloud IP
        run: |
          set -uo pipefail
          urls=(
            "https://rebang.today/"
            "https://tophub.today/"
            "https://hot.cnxiaobai.com/"
            "https://s.weibo.com/top/summary"
            "https://www.douyin.com/hot"
            "https://www.xiaohongshu.com/explore"
            "https://top.baidu.com/board"
            "https://jikipedia.com/"
            "https://moyuoo.com/"
            "https://cuiuc.com/"
            "https://jinghooo.com/"
            "https://www.newrank.cn/"
            "https://www.bilibili.com/v/hot/"
          )
          ua="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          body="$(mktemp)"
          trap 'rm -f "$body"' EXIT
          for u in "${urls[@]}"; do
            echo "==== ${u} ===="
            : > "$body"
            code="$(curl -sSL -o "$body" -w '%{http_code}' -A "$ua" --max-time 25 "$u" 2>/dev/null || true)"
            code="${code:-000}"
            bytes="$(wc -c < "$body" | tr -d ' ')"
            title="$(grep -ioE '<title>[^<]*</title>' "$body" | head -1 || true)"
            wall=""
            if grep -iqE '(登录|请登录|captcha|安全验证|滑动验证|verify you are human)' "$body"; then
              wall="⚠ 疑似登录/验证墙"
            fi
            echo "http=${code} bytes=${bytes} title=${title} ${wall}"
          done
          echo ""
          echo "判读：http=200 且 bytes 较大、无登录墙 = 该云 IP 可直接读取（云端方案可行）。"
          echo "      大量 403/000 或登录墙 = 云 IP 被拦，需要换 IP/代理或保留本地运行。"
