name: daily-news-catchup

# Resilience for the 日报 feed against GitHub dropping scheduled events (mirrors daily-catchup).
# If today's Asia/Shanghai 日报 envelope is still MISSING and no daily-news-publish run is active,
# dispatch daily-news-publish to catch up. workflow_dispatch is processed reliably. Cheap when
# there's nothing to do. Quality is unchanged: the triggered publish applies the same gates and
# may legitimately produce partial/skipped.

on:
  schedule:
    # Every hour at :15, 23:15–04:15 UTC = 07:15–12:15 Asia/Shanghai — starts 1h after the 06:00
    # news publish (mirrors the meme catchup's 1h-after-07:00 window), staggered :15 off it.
    - cron: "15 23,0,1,2,3,4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write # to dispatch daily-news-publish

concurrency:
  group: daily-news-catchup
  cancel-in-progress: false

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Dispatch a catch-up 日报 publish if today is missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(TZ=Asia/Shanghai date +%F)"
          FILE="data/daily-news/${DATE}.json"

          if [ -f "$FILE" ]; then
            echo "Today (${DATE}) already has a 日报 envelope; nothing to catch up."
            exit 0
          fi

          # Transient GitHub API failures (e.g. a 503) must not burn this hour's catch-up slot —
          # 2026-07-20 the ONLY catchup that fired died on a single 503 and the 日报 stayed
          # unpublished all morning. Retry the API calls with backoff. If the run-list check still
          # fails after retries, PROCEED to dispatch: daily-news-publish has its own concurrency
          # group and already-published dedup guard, so a duplicate dispatch queues or no-ops.
          ACTIVE=""
          for attempt in 1 2 3; do
            if ACTIVE="$(gh run list --workflow=daily-news-publish.yml --json status \
              --jq '[.[] | select(.status == "in_progress" or .status == "queued")] | length')"; then
              break
            fi
            ACTIVE=""
            echo "run-list attempt ${attempt}/3 failed (transient API error?)."
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 15)); fi
          done
          if [ "${ACTIVE:-0}" -gt 0 ]; then
            echo "daily-news-publish already in progress/queued; letting it finish."
            exit 0
          fi

          echo "Today (${DATE}) 日报 not published; dispatching catch-up daily-news-publish."
          for attempt in 1 2 3; do
            if gh workflow run daily-news-publish.yml --ref main; then
              echo "Dispatched (attempt ${attempt})."
              exit 0
            fi
            echo "dispatch attempt ${attempt}/3 failed (transient API error?)."
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 20)); fi
          done
          echo "::error::Failed to dispatch daily-news-publish after 3 attempts."
          exit 1
