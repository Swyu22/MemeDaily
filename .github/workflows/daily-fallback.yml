name: daily-fallback

on:
  schedule:
    # 13:20 UTC = 21:20 Asia/Shanghai. Evening LAST resort: only marks today "skipped" if
    # the primary publish AND every daily-catchup attempt failed to produce any envelope.
    # Runs late on purpose so it can't pre-empt the daytime catch-up retries.
    - cron: "20 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the Pages deploy after a GITHUB_TOKEN push

jobs:
  skipped-day:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run fallback:skipped
      - run: npm run check

      - name: Commit skipped day if created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Stage first: a new skipped envelope is UNTRACKED and `git diff --quiet` would miss it.
          git add data/daily
          if git diff --cached --quiet; then
            echo "No skipped fallback needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): add skipped daily fallback"
          gh auth setup-git
          # Rebase onto the current tip first: this job can race a late publish/catch-up writer.
          git pull --rebase origin main
          git push
          bash scripts/dispatch-pages.sh "$(git rev-parse HEAD)"
