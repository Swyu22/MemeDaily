name: daily-fallback

on:
  schedule:
    # 13:20 UTC = 21:20 Asia/Shanghai. Evening LAST resort: only marks today "skipped" if
    # the primary publish AND every daily-catchup attempt failed to produce any envelope.
    # Runs late on purpose so it can't pre-empt the daytime catch-up retries.
    - cron: "20 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the Pages deploy after a GITHUB_TOKEN push

jobs:
  skipped-day:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run fallback:skipped
      - run: npm run validate

      - name: Commit skipped day if created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/daily; then
            echo "No skipped fallback needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily
          git commit -m "chore(data): add skipped daily fallback"
          git push
          # GITHUB_TOKEN pushes don't trigger on:push workflows, so kick the deploy.
          gh workflow run pages.yml --ref main
