name: daily-news-monitor

# Server-free alerting for the 日报 feed: if today's Asia/Shanghai 日报 envelope is not
# published/partial, open/update a GitHub Issue. Mirrors daily-monitor; titles are
# 日报-specific so the two monitors never match each other's issues.

on:
  schedule:
    - cron: "45 6 * * *" # 14:45 Asia/Shanghai (staggered off the meme monitor's 14:30)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Check today's 日报 publish and alert if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(TZ=Asia/Shanghai date +%F)"

          # Cost-runaway guard for the news pipeline (~$4-5/run).
          SINCE="$(date -u -d '18 hours ago' +%Y-%m-%dT%H:%M:%SZ)"
          RUNS="$(gh run list --workflow=daily-news-publish.yml --limit 40 --json createdAt --jq "[.[] | select(.createdAt > \"$SINCE\")] | length" 2>/dev/null || echo 0)"
          if [ "${RUNS:-0}" -gt 4 ]; then
            RTITLE="DailyNews 成本异常: ${DATE} (18h 内 daily-news-publish 运行 ${RUNS} 次)"
            RBODY="自动监控：过去 18 小时 daily-news-publish 运行了 ${RUNS} 次（每次约 \$4-5）。可能是反复重试/失败在烧预算，请检查近期运行。"
            REX="$(gh issue list --state open --json number,title --jq "[.[] | select(.title | contains(\"DailyNews 成本异常: ${DATE}\"))][0].number // empty")"
            if [ -n "$REX" ]; then gh issue comment "$REX" --body "$RBODY"; else gh issue create --title "$RTITLE" --body "$RBODY"; fi
          fi

          FILE="data/daily-news/${DATE}.json"

          if [ -f "$FILE" ]; then
            STATUS="$(node -e "try{process.stdout.write(String(JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).status||'invalid'))}catch(e){process.stdout.write('invalid')}" "$FILE" 2>/dev/null || echo invalid)"
          else
            STATUS="missing"
          fi
          echo "date=${DATE} status=${STATUS}"

          if [ "$STATUS" = "published" ] || [ "$STATUS" = "partial" ]; then
            echo "OK: today's 日报 is published/partial."
            exit 0
          fi

          TITLE="DailyNews 未发布告警: ${DATE} (${STATUS})"
          BODY="自动监控：\`data/daily-news/${DATE}.json\`（Asia/Shanghai）状态为 \`${STATUS}\`，未成功发布。请检查 daily-news-publish 自动化是否运行成功。"
          EXISTING="$(gh issue list --state open --json number,title --jq "[.[]|select(.title|contains(\"DailyNews 未发布告警: ${DATE}\"))][0].number // empty")"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
