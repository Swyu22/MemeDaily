version: 2
updates:
  # Keep GitHub Actions current — esp. the SHA-pinned third-party action in daily-publish.yml,
  # which would otherwise never receive upstream security patches once pinned.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
